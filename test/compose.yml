name: fail2ban

services:
  fail2ban:
    image: ${FAIL2BAN_IMAGE:-tdllllll/fail2ban}
    container_name: ${FAIL2BAN_CONTAINER:-fail2ban}
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./data:/data
      - ./data/run:/var/run/fail2ban
      - ./data/lib:/var/lib/fail2ban
      - /var/log:/var/log:ro
      - /run/systemd/journal:/run/systemd/journal:ro
      - /etc/machine-id:/etc/machine-id:ro
    env_file:
      - "./fail2ban.env"
    environment:
      - "IPTABLES_MODE=${IPTABLES_MODE:-auto}"
    restart: always
